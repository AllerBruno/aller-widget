<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aller Studio — Quote Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --lime:#D5FE00;
    --dark:#121212;
    --body:#70808F;
    --n200:#F2F4F5;
    --n300:#DADEE2;
    --track:#D6D6D6;
    --btn:#21262B;
    --btn-border:#191C20;
    --danger:#FF5C5C;
    --bubble-grad:linear-gradient(90deg,#DADEE2 0%,#F2F4F5 100%);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Inter',Helvetica,Arial,sans-serif;
    background:transparent;
    display:flex;align-items:center;justify-content:center;
    padding:0;
  }

  /* ── Widget shell ─────────────────────────────── */
  .widget{
    position:relative;
    width:100%;max-width:1000px;height:700px;
    background:rgba(249,250,251,.96);
    backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
    border:1px solid #fff;border-radius:20px;
    overflow:hidden;
    display:flex;flex-direction:column;
  }

  /* progress bar */
  .progress{position:absolute;top:0;left:0;right:0;height:8px;background:var(--track);z-index:5}
  .progress .fill{height:100%;width:0;background:var(--lime);transition:width .4s ease}

  /* header */
  .header{
    flex:0 0 116px;
    display:flex;align-items:center;gap:16px;
    padding:0 31px;padding-top:8px;
    border-bottom:1px solid var(--n300);
    position:relative;
  }
  .brand-name{font-family:'Rajdhani',Arial,sans-serif;font-weight:700;font-size:24px;line-height:24px;color:#000;letter-spacing:.5px}
  .brand-sub{font-size:12px;line-height:18px;color:var(--body);margin-top:6px}

  /* logo */
  .logo{
    position:relative;flex:0 0 auto;
    background:radial-gradient(140% 140% at 0% 0%,#FFFFFF 0%,#F5FFBF 25%,#EAFF80 50%,#E0FE40 75%,#D5FE00 100%);
    border-radius:24%;
    display:flex;align-items:center;justify-content:center;
    box-shadow:inset 1px 1px 2px rgba(255,255,255,.7),inset -1px -2px 3px rgba(18,18,18,.18),0 1px 2px rgba(18,18,18,.18);
  }
  .logo .bar{
    width:48%;height:21%;background:var(--dark);border-radius:999px;
    box-shadow:inset .6px .6px .6px rgba(255,255,255,.4),inset -.6px -.6px .6px rgba(18,18,18,.35),
               .4px .6px .6px rgba(18,18,18,.25);
  }
  .logo.lg{width:64px;height:64px}
  .logo.sm{width:32px;height:32px}

  /* vertical grid lines — sit behind all content (input, buttons, titles, bubbles) */
  .vline{
    position:absolute;top:0;bottom:0;
    width:1px;background:var(--n300);
    z-index:-1;pointer-events:none;
  }
  .vline-l{left:23px}
  .vline-r{right:23px}

  /* corner dot clusters */
  .dots{position:absolute;width:14px;height:14px;z-index:4;pointer-events:none}
  .dots i{position:absolute;width:3px;height:3px;background:var(--n300)}
  .dots i:nth-child(1){top:0;left:0}.dots i:nth-child(2){top:0;right:0}
  .dots i:nth-child(3){bottom:0;left:0}.dots i:nth-child(4){bottom:0;right:0}

  /* ── Chat area ────────────────────────────────── */
  .chat{
    flex:1 1 auto;overflow-y:auto;overflow-x:hidden;
    padding:38px 39px 24px;
    display:flex;flex-direction:column;gap:24px;
    scroll-behavior:smooth;
  }
  .chat::-webkit-scrollbar{width:6px}
  .chat::-webkit-scrollbar-thumb{background:var(--n300);border-radius:3px}

  .row{display:flex;gap:11px;align-items:flex-start;animation:rise .35s ease both}
  .row.user{justify-content:flex-end}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){.row{animation:none}.progress .fill{transition:none}}

  .bubble{
    border:1px solid #fff;padding:20px;
    font-size:14px;line-height:20px;font-weight:500;
    max-width:72%;
    word-break:break-word;
  }
  .bubble.ai{
    background:var(--bubble-grad);
    color:var(--body);
    border-radius:4px 16px 16px 16px;
  }
  .bubble.user{
    background:var(--lime);
    color:var(--dark);
    border-radius:16px 4px 16px 16px;
    text-align:right;
  }

  /* typing indicator */
  .typing{display:inline-flex;gap:5px;align-items:center;height:20px}
  .typing i{width:6px;height:6px;border-radius:50%;background:var(--body);opacity:.4;animation:blink 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}
  .typing i:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:.9}}

  /* quick-reply tags */
  .tags{display:flex;flex-wrap:wrap;gap:8px;margin-left:43px;animation:rise .35s ease both}
  .tag{
    border:1px solid #fff;border-radius:16px;padding:8px;
    font-family:'Inter',sans-serif;font-size:12px;line-height:16px;font-weight:500;color:var(--dark);
    background:var(--bubble-grad);
    cursor:pointer;transition:transform .12s ease,background .12s ease;
    user-select:none;
  }
  .tag:hover{transform:translateY(-1px)}
  .tag:focus-visible{outline:2px solid var(--dark);outline-offset:2px}
  .tag.selected{background:var(--lime)}
  .tag.confirm{background:var(--dark);color:var(--lime)}

  /* ── Project brief card ───────────────────────── */
  .brief{
    width:100%;border:1px solid #fff;border-radius:16px;
    background:var(--bubble-grad);
    padding:16px;
    display:flex;flex-direction:column;gap:20px;
    animation:rise .4s ease both;
  }
  .brief h3{font-family:'Rajdhani',Arial,sans-serif;font-weight:700;font-size:24px;line-height:24px;color:#000}
  .brief .rows{display:flex;flex-direction:column;gap:16px}
  .brief .r{
    display:flex;justify-content:space-between;align-items:center;gap:16px;
    padding-bottom:8px;border-bottom:1px solid #fff;
    font-size:14px;line-height:20px;
  }
  .brief .r .k{color:var(--body);font-weight:500}
  .brief .r .v{color:var(--dark);font-weight:600;text-align:right}
  .brief .verdict{display:flex;flex-direction:column;gap:13px;align-items:flex-start}
  .badge{
    border:1px solid #fff;border-radius:16px;padding:8px;
    font-size:12px;line-height:16px;font-weight:500;color:var(--dark);
    background:var(--lime);
  }
  .badge.no{background:var(--bubble-grad)}
  .price{font-family:'Rajdhani',Arial,sans-serif;font-weight:700;font-size:32px;line-height:32px;color:#000}

  .cta{
    align-self:flex-start;
    display:inline-flex;align-items:center;gap:10px;
    background:var(--btn);color:var(--lime);
    border:2px solid var(--btn-border);border-radius:16px;
    padding:14px 22px;font-family:'Rajdhani',Arial,sans-serif;font-weight:700;font-size:16px;letter-spacing:.5px;
    text-decoration:none;cursor:pointer;transition:transform .12s ease;
  }
  .cta:hover{transform:translateY(-1px)}

  /* Cal.com inline embed card */
  .cal-card{
    width:100%;border:1px solid #fff;border-radius:16px;
    background:#fff;overflow:hidden;
    animation:rise .4s ease both;
  }
  .cal-card .cal-head{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:14px 16px;background:var(--bubble-grad);border-bottom:1px solid #fff;
  }
  .cal-card .cal-head h4{font-family:'Rajdhani',Arial,sans-serif;font-weight:700;font-size:18px;color:#000}
  .cal-card .cal-head a{font-size:12px;font-weight:500;color:var(--body);text-decoration:none}
  .cal-card .cal-head a:hover{color:var(--dark)}
  .cal-body{height:520px;width:100%;overflow-y:auto;overscroll-behavior:contain}
  .cal-body::-webkit-scrollbar{width:6px}
  .cal-body::-webkit-scrollbar-thumb{background:var(--n300);border-radius:3px}
  @media (max-width:640px){ .cal-body{height:560px} }

  /* ── Cal.com slide-over panel (covers the whole widget, own scroll context) ── */
  .cal-overlay{
    position:absolute;inset:0;z-index:50;
    background:#fff;
    display:flex;flex-direction:column;
    transform:translateX(100%);
    transition:transform .35s ease;
  }
  .cal-overlay.open{transform:translateX(0)}
  .cal-overlay-head{
    flex:0 0 auto;display:flex;align-items:center;gap:12px;
    padding:16px 20px;background:var(--bubble-grad);border-bottom:1px solid #fff;
  }
  .cal-back{
    width:36px;height:36px;border-radius:50%;border:none;background:#fff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;color:var(--dark);
    transition:transform .12s ease, background .12s ease;
  }
  .cal-back:hover{background:var(--n200)}
  .cal-back:active{transform:scale(.92)}
  .cal-back:focus-visible{outline:2px solid var(--lime);outline-offset:2px}
  .cal-overlay-head h4{flex:1;font-family:'Rajdhani',Arial,sans-serif;font-weight:700;font-size:18px;color:#000}
  .cal-overlay-head a{font-size:12px;font-weight:500;color:var(--body);text-decoration:none;white-space:nowrap}
  .cal-overlay-head a:hover{color:var(--dark)}
  .cal-overlay-body{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

  /* ── Input bar ────────────────────────────────── */
  .inputbar{
    flex:0 0 auto;
    display:flex;gap:8px;align-items:flex-end;
    padding:18px 39px 23px;
    border-top:1px solid var(--n300);
    position:relative;
  }
  .field{
    flex:1;height:64px;
    background:var(--bubble-grad);
    border:1px solid #fff;border-radius:16px;
    display:flex;align-items:center;overflow:hidden;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .field:focus-within{
    border-color:var(--lime);
    box-shadow:0 0 0 3px rgba(213,254,0,.25);
  }
  .field.error{
    border-color:var(--danger);
    box-shadow:0 0 0 3px rgba(255,92,92,.2);
    animation:fieldShake .3s ease;
  }
  @keyframes fieldShake{
    10%,90%{transform:translateX(-1px)}
    20%,80%{transform:translateX(2px)}
    30%,50%,70%{transform:translateX(-3px)}
    40%,60%{transform:translateX(3px)}
  }
  .field input{
    width:100%;height:100%;background:transparent;border:none;outline:none;
    padding:0 19px;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--dark);
  }
  .field input::placeholder{color:var(--body)}
  .send{
    flex:0 0 64px;height:64px;
    background:var(--btn);border:2px solid var(--btn-border);border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform .12s ease,opacity .12s ease,box-shadow .12s ease;
  }
  .send:hover:not(:disabled){
    transform:translateY(-2px);
    box-shadow:0 8px 18px rgba(0,0,0,.22);
  }
  .send:active:not(:disabled){
    transform:translateY(0) scale(.93);
    box-shadow:0 2px 6px rgba(0,0,0,.18);
  }
  .send:focus-visible{
    outline:2px solid var(--lime);
    outline-offset:3px;
  }
  .send:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
  .send.sending{cursor:default}
  .send.sending svg{animation:sendPulse 1s ease-in-out infinite}
  @keyframes sendPulse{0%,100%{opacity:1}50%{opacity:.35}}
  .send svg{width:24px;height:24px}

  /* mobile */
  @media (max-width:640px){
    .widget{height:100vh;height:100dvh;max-height:720px;border-radius:16px}
    .header{
      flex-basis:92px;
      padding:max(8px, env(safe-area-inset-top)) 20px 0;
    }
    .logo.lg{width:48px;height:48px}
    .brand-name{font-size:20px}
    .vline-l{left:17px}
    .vline-r{right:17px}
    .chat{padding:24px 18px 16px;gap:18px}
    .bubble{max-width:84%;padding:14px}
    .tags{margin-left:0}
    .tag{padding:11px 14px;font-size:13px}
    .brief .r .v{word-break:break-word}
    .price{font-size:26px}
    .cal-overlay-head{padding:14px 16px}
    .cal-overlay-head h4{font-size:16px}
    .cal-overlay-head a{display:none}
    .cal-back{width:40px;height:40px}
    .inputbar{
      padding:12px 18px max(16px, env(safe-area-inset-bottom));
    }
    .field,.send{height:54px}
    .send{flex-basis:54px}
    .field input{font-size:16px} /* ≥16px avoids iOS auto-zoom on focus */
  }
</style>
</head>
<body>

<div class="widget" id="widget">
  <div class="progress"><div class="fill" id="progressFill"></div></div>

  <!-- vertical grid lines -->
  <div class="vline vline-l"></div>
  <div class="vline vline-r"></div>

  <div class="header">
    <div class="logo lg"><span class="bar"></span></div>
    <div>
      <div class="brand-name">ALLER STUDIO</div>
      <div class="brand-sub" id="brandSub">Quote Assistant ∙ ≈5-10 min</div>
    </div>
    <span class="dots" style="left:16px;bottom:-8px"><i></i><i></i><i></i><i></i></span>
    <span class="dots" style="right:16px;bottom:-8px"><i></i><i></i><i></i><i></i></span>
  </div>

  <div class="chat" id="chat" aria-live="polite"></div>

  <div class="inputbar">
    <span class="dots" style="left:16px;top:-8px"><i></i><i></i><i></i><i></i></span>
    <span class="dots" style="right:16px;top:-8px"><i></i><i></i><i></i><i></i></span>
    <div class="field">
      <input id="input" type="text" autocomplete="off" enterkeyhint="send" placeholder="Write your answer..." aria-label="Your answer">
    </div>
    <button class="send" id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 18L18 6M18 6H9M18 6V15" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="cal-overlay" id="calOverlay" aria-hidden="true">
    <div class="cal-overlay-head">
      <button class="cal-back" id="calBack" type="button" aria-label="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14.7568 6L9.90713 9.99038C8.69762 10.9856 8.69762 12.8143 9.90713 13.8095L15 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <h4 id="calOverlayTitle">PICK YOUR TIME</h4>
      <a href="" target="_blank" rel="noopener" id="calOverlayOpenTab">Open in new tab ↗</a>
    </div>
    <div class="cal-overlay-body" id="cal-inline"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   ALLER STUDIO — QUOTE ASSISTANT (AI-powered)
   ─────────────────────────────────────────────────────────────
   API_ENDPOINT → your Render proxy URL
   CAL_LINK     → your Cal.com link slug
   WEBHOOK_URL  → Make/Zapier webhook for lead capture (optional)
   ════════════════════════════════════════════════════════════ */
const CONFIG = {
  API_ENDPOINT: "https://aller-proxy.onrender.com/chat",
  CAL_LINK    : "allerstudio/intro",
  WEBHOOK_URL : ""
};
const CAL_URL = "https://cal.com/" + CONFIG.CAL_LINK;

/* ── Pricing logic (USD) ────────────────────────── */
const PRICE = {
  "ux/ui":[7000,10000], "branding":[5000,8000],
  "web development":[5000,9000], "desarrollo web":[5000,9000],
  "game ux/ui / huds":[7000,10000], "pitch deck":[2000,4000],
  "full 360":[18000,35000]
};
const BUDGET_RANGE = [ [4000,4000],[5000,10000],[10000,20000],[20000,50000],[50000,100000],[100000,200000] ];

/* ── State ──────────────────────────────────────── */
const S = {
  lang: "en",
  step: 0,
  data: { name:"", location:"", project:"", services:[], branding:"", brandingIdx:-1, product:"", competitors:"", budgetIdx:-1, budgetText:"", timeline:"", email:"" },
  messages: [],   // full conversation history for Claude
  multiSel: new Set(),
  busy: false
};
const TOTAL_STEPS = 11;

/* ── Service & budget options (bilingual) ───────── */
const OPTS = {
  services: { en:["UX/UI","Branding","Web Development","Game UX/UI / HUDS","Pitch Deck","Full 360"],
               es:["UX/UI","Branding","Desarrollo Web","Game UX/UI / HUDS","Pitch Deck","Full 360"] },
  branding:  { en:["Starting from scratch","Logo only","Full branding ready"],
               es:["Desde cero","Solo logo","Branding completo listo"] },
  budget:    { en:["Monthly Retainer $4k","$5k–$10k","$10k–$20k","$20k–$50k","$50k–$100k","+$100k"],
               es:["Retainer mensual $4k","$5k–$10k","$10k–$20k","$20k–$50k","$50k–$100k","+$100k"] },
  timeline:  { en:["ASAP (<4 weeks)","Normal (1-3 months)","Flexible (3+ months)"],
               es:["ASAP (<4 semanas)","Normal (1-3 meses)","Flexible (3+ meses)"] }
};

/* ── Fixed question flow (deterministic — never depends on the AI) ──
   STEP_FIELD: where to store a free-typed answer for the step currently
   being asked. QUESTIONS[N]: the question shown when transitioning INTO
   step N (i.e. right after the answer for step N-1 was collected).
   useAck:true means a short Claude-generated acknowledgment of the PREVIOUS
   answer is prepended — if that call fails for any reason, the question
   still gets asked exactly the same, just without the extra flourish. ── */
const STEP_FIELD = {
  0:"name", 1:"location", 2:"project", 3:"services",
  4:"branding", 5:"product", 6:"competitors", 7:"budgetText", 8:"timeline"
};

const QUESTIONS = {
  1: { en:d=>`Nice to meet you, ${d.name}! Where are you based?`,
       es:d=>`¡Un gusto, ${d.name}! ¿Desde dónde nos escribes?` },
  2: { en:d=>`Got it. What's the name of your project or company?`,
       es:d=>`Perfecto. ¿Cómo se llama tu proyecto o empresa?` },
  3: { en:d=>`What type of service are you looking for?`,
       es:d=>`¿Qué tipo de servicio buscas?`,
       tag:"services", multi:true },
  4: { en:d=>`Do you already have branding in place — logo, colors, etc.?`,
       es:d=>`¿Ya tienes identidad visual — logo, colores, etc.?`,
       tag:"branding" },
  5: { en:d=>`Tell me about ${d.project||"the project"} — what does it do, and who's it for?`,
       es:d=>`Cuéntame sobre ${d.project||"el proyecto"} — ¿qué hace y para quién es?` },
  6: { en:d=>`Who are your main competitors, or are there platforms (any industry) whose design you admire?`,
       es:d=>`¿Quiénes son tus principales competidores, o hay plataformas (de cualquier rubro) cuyo diseño admires?`,
       useAck:true },
  7: { en:d=>`What's your budget range for this project?`,
       es:d=>`¿Cuál es tu rango de presupuesto para este proyecto?`,
       tag:"budget", useAck:true },
  8: { en:d=>`What's your ideal timeline?`,
       es:d=>`¿Cuál es tu timeline ideal?`,
       tag:"timeline" },
  9: { en:d=>`Last thing — what's your email so we can send over the detailed proposal?`,
       es:d=>`Última cosa — ¿cuál es tu email para enviarte la propuesta detallada?` }
};

/* ── UI Elements ────────────────────────────────── */
const chat    = document.getElementById("chat");
const input   = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const fill    = document.getElementById("progressFill");

/* ── UI Helpers ─────────────────────────────────── */
function avatar(){ const d=document.createElement("div"); d.className="logo sm"; d.innerHTML='<span class="bar"></span>'; return d; }

function addAI(text){
  const row=document.createElement("div"); row.className="row";
  row.appendChild(avatar());
  const b=document.createElement("div"); b.className="bubble ai";
  b.innerHTML=text.replace(/\n/g,"<br>");
  row.appendChild(b); chat.appendChild(row); scrollDown();
  S.messages.push({role:"assistant", content:text});
}

function addUser(text){
  const row=document.createElement("div"); row.className="row user";
  const b=document.createElement("div"); b.className="bubble user"; b.textContent=text;
  row.appendChild(b); chat.appendChild(row); scrollDown();
  S.messages.push({role:"user", content:text});
}

let typingRow=null;
function showTyping(){
  typingRow=document.createElement("div"); typingRow.className="row";
  typingRow.appendChild(avatar());
  const b=document.createElement("div"); b.className="bubble ai";
  b.innerHTML='<span class="typing"><i></i><i></i><i></i></span>';
  typingRow.appendChild(b); chat.appendChild(typingRow); scrollDown();
}
function hideTyping(){ if(typingRow){typingRow.remove();typingRow=null;} }

let tagWrap=null;
function showTags(type, multi=false, onPick){
  clearTags();
  const options = OPTS[type][S.lang] || OPTS[type]["en"];
  tagWrap=document.createElement("div"); tagWrap.className="tags";
  options.forEach(label=>{
    const el=document.createElement("button"); el.type="button"; el.className="tag"; el.textContent=label;
    el.onclick=()=>{
      if(multi){
        el.classList.toggle("selected");
        S.multiSel.has(label)?S.multiSel.delete(label):S.multiSel.add(label);
      } else { onPick(label); }
    };
    tagWrap.appendChild(el);
  });
  if(multi){
    const ok=document.createElement("button"); ok.type="button"; ok.className="tag confirm";
    ok.textContent = S.lang==="es" ? "Confirmar selección →" : "Confirm selection →";
    ok.onclick=()=>{ if(S.multiSel.size) onPick([...S.multiSel]); };
    tagWrap.appendChild(ok);
  }
  chat.appendChild(tagWrap); scrollDown();
  input.placeholder = multi
    ? (S.lang==="es" ? "Selecciona opciones y presiona enviar →" : "Tap options, then press send →")
    : (S.lang==="es" ? "Toca una opción o escribe tu respuesta..." : "Tap an option or type your answer...");
}
function clearTags(){ if(tagWrap){tagWrap.remove();tagWrap=null;} S.multiSel.clear(); input.placeholder=S.lang==="es"?"Escribe tu respuesta...":"Write your answer..."; }
function flashFieldError(){
  const f = input.closest(".field");
  if(!f) return;
  f.classList.remove("error");
  requestAnimationFrame(()=>{ f.classList.add("error"); });
  setTimeout(()=>f.classList.remove("error"), 600);
}
function scrollDown(){ requestAnimationFrame(()=>{ chat.scrollTop=chat.scrollHeight; }); }
function setProgress(){ fill.style.width=Math.min(100,(S.step/TOTAL_STEPS)*100)+"%"; }
const wait=ms=>new Promise(r=>setTimeout(r,ms));

/* ── Optional AI acknowledgment ──────────────────────────────────
   Used only for flavor on the two open-text questions (product
   description, competitors). Plain text, never JSON, never controls
   step progression. Any failure → empty string → question still asks
   normally with zero personalization, nothing breaks. ── */
async function getAck(answerText){
  if(!answerText) return "";
  try{
    const sys = S.lang==="es"
      ? `Eres el asistente de Aller Studio (estudio de diseño y desarrollo para startups tech). El usuario acaba de responder: "${answerText}". Escribe SOLO una oración corta (máx 15 palabras) reconociendo su respuesta de forma específica e inteligente. Tono directo, seguro, "Experto Visionario" — sin relleno, sin "¡Genial!", sin preguntas, sin saludos, sin emojis. Si no hay nada interesante que decir, responde con un string vacío. RESPONDE SOLO CON LA ORACIÓN, sin comillas ni texto extra.`
      : `You are the Aller Studio assistant (design & dev studio for tech startups). The user just answered: "${answerText}". Write ONLY one short sentence (max 15 words) acknowledging their answer in a specific, sharp way. Direct, confident, "Experto Visionario" tone — no filler, no "Great!", no questions, no greetings, no emojis. If there's nothing interesting to say, reply with an empty string. RESPOND WITH ONLY THE SENTENCE, no quotes, no extra text.`;

    const res = await fetch(CONFIG.API_ENDPOINT, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 60,
        system: sys,
        messages: [{role:"user", content: answerText}]
      })
    });
    if(!res.ok) return "";
    const data = await res.json();
    let text = (data.content||[]).filter(c=>c.type==="text").map(c=>c.text).join("").trim();
    text = text.replace(/^["“'']+|["”'']+$/g,"").trim();
    if(!text || text.length>160 || /\?/.test(text)) return "";
    return text;
  }catch(e){
    console.error("getAck failed (non-fatal):", e);
    return "";
  }
}

/* ── Qualification + estimate ───────────────────── */
function parseBudgetFree(text){
  const m=text.replace(/[, ]/g,"").match(/\$?(\d+(?:\.\d+)?)(k)?/i);
  if(!m) return null;
  let v=parseFloat(m[1]); if(m[2]) v*=1000;
  return v;
}
function isMatch(){
  if(S.data.budgetIdx>=0) return true;
  const v=parseBudgetFree(S.data.budgetText||"");
  return v===null ? true : v>=5000;
}
function detectVertical(){
  const txt=(S.data.product+" "+S.data.competitors).toLowerCase();
  const map=[["fintech","Fintech"],["finance","Fintech"],["bank","Fintech"],["payment","Fintech"],["pago","Fintech"],
    ["saas","SaaS"],["software","SaaS"],["web3","Web3"],["crypto","Web3"],["blockchain","Web3"],
    ["health","Health Tech"],["salud","Health Tech"],["edtech","Edtech"],["educa","Edtech"],
    ["e-commerce","E-commerce"],["ecommerce","E-commerce"],["tienda","E-commerce"],
    ["game","Gaming"],["juego","Gaming"]];
  for(const [k,v] of map) if(txt.includes(k)) return v;
  return S.lang==="es" ? "Startup tech" : "Tech startup";
}
function estimate(){
  const full=S.data.services.some(s=>/full 360/i.test(s));
  let lo=0,hi=0;
  if(full){ [lo,hi]=PRICE["full 360"]; }
  else{
    S.data.services.forEach(s=>{
      const r=PRICE[s.toLowerCase()]||[4000,8000]; lo+=r[0]; hi+=r[1];
    });
    if(!S.data.services.length){ lo=5000; hi=12000; }
  }
  if(S.data.budgetIdx>0){
    const [blo,bhi]=BUDGET_RANGE[S.data.budgetIdx];
    const nlo=Math.max(lo,blo),nhi=Math.min(hi,bhi);
    if(nlo<nhi){ lo=nlo; hi=nhi; }
  }
  const round=v=>Math.round(v/500)*500;
  return `$${round(lo).toLocaleString("en-US")} – $${round(hi).toLocaleString("en-US")} USD`;
}

/* ── Brief card ─────────────────────────────────── */
function renderBrief(){
  const match=isMatch();
  const L = S.lang==="es";
  const brandingLabels = OPTS.branding[S.lang];
  const budgetLabels = OPTS.budget[S.lang];
  const serviceStr = S.data.services.join(" + ")||"—";
  const budgetStr = S.data.budgetIdx>=0 ? budgetLabels[S.data.budgetIdx] : (S.data.budgetText||"—");
  const brandingStr = S.data.brandingIdx>=0 ? brandingLabels[S.data.brandingIdx] : (S.data.branding||"—");

  const card=document.createElement("div"); card.className="brief";
  const rows=[
    [L?"Contacto":"Partner", S.data.name],
    [L?"Ubicación":"Location", S.data.location],
    [L?"Proyecto":"Project", S.data.project],
    ["Vertical", detectVertical()],
    [L?"Servicio":"Service", serviceStr],
    [L?"Branding existente":"Existing branding", brandingStr],
    [L?"Presupuesto":"Budget", budgetStr],
    ["Timeline", S.data.timeline]
  ];
  card.innerHTML=`<h3>${L?"Brief del proyecto":"Project brief"}</h3>
    <div class="rows">${rows.map(([k,v])=>`<div class="r"><span class="k">${k}</span><span class="v">${v||"—"}</span></div>`).join("")}</div>
    <div class="verdict">
      <span class="badge ${match?"":"no"}">${match?(L?"Match — Gran fit para Aller Studio":"Match — Great fit for Aller Studio"):(L?"No es fit por ahora — pero sigamos en contacto":"Not a fit right now — but let's stay in touch")}</span>
      ${match?`<div class="price">${estimate()}</div>`:""}
    </div>`;
  chat.appendChild(card); scrollDown();
}

/* ── Lead capture ───────────────────────────────── */
function sendLead(){
  if(!CONFIG.WEBHOOK_URL) return;
  const payload={...S.data, vertical:detectVertical(), match:isMatch(), estimate:isMatch()?estimate():null,
    lang:S.lang, source:"allerstudio.com quote widget", ts:new Date().toISOString()};
  fetch(CONFIG.WEBHOOK_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)}).catch(()=>{});
}

/* ── Cal.com slide-over panel ─────────────────────
   Lives OUTSIDE the .chat scroll container as a full overlay, so the
   iframe's own scroll/wheel handling never fights with the chat's
   scroll — that's what caused the "can't scroll past the calendar" bug. */
const calOverlay = document.getElementById("calOverlay");
const calBack    = document.getElementById("calBack");
let calLoaded = false;

function openCalPanel(){
  const L=S.lang==="es";
  document.getElementById("calOverlayTitle").textContent = L?"ELIGE TU HORARIO":"PICK YOUR TIME";
  const tabLink = document.getElementById("calOverlayOpenTab");
  tabLink.href = CAL_URL;
  tabLink.textContent = L?"Abrir en pestaña nueva ↗":"Open in new tab ↗";
  calOverlay.classList.add("open");
  calOverlay.setAttribute("aria-hidden","false");
  if(!calLoaded){ initCalEmbed(); calLoaded=true; }
}
function closeCalPanel(){
  calOverlay.classList.remove("open");
  calOverlay.setAttribute("aria-hidden","true");
}
calBack.addEventListener("click", closeCalPanel);

function initCalEmbed(){
  const L=S.lang==="es";
  try{
    (function(C,A,L){let p=function(a,ar){a.q.push(ar)};let d=C.document;C.Cal=C.Cal||function(){let cal=C.Cal;let ar=arguments;if(!cal.loaded){cal.ns={};cal.q=cal.q||[];d.head.appendChild(d.createElement("script")).src=A;cal.loaded=true}if(ar[0]===L){const api=function(){p(api,arguments)};const namespace=ar[1];api.q=api.q||[];if(typeof namespace==="string"){cal.ns[namespace]=cal.ns[namespace]||api;p(cal.ns[namespace],ar);p(cal,["initNamespace",namespace])}else p(cal,ar);return}p(cal,ar)}})(window,"https://app.cal.com/embed/embed.js","init");
    Cal("init","intro",{origin:"https://app.cal.com"});
    Cal.ns["intro"]("inline",{elementOrSelector:"#cal-inline",calLink:CONFIG.CAL_LINK,config:{layout:"month_view",name:S.data.name||"",email:S.data.email||""}});
    Cal.ns["intro"]("ui",{hideEventTypeDetails:false,layout:"month_view"});
  }catch(e){
    document.getElementById("cal-inline").innerHTML=`<div style="padding:24px"><a class="cta" href="${CAL_URL}" target="_blank" rel="noopener">${L?"Agendar llamada ↗":"Book a call ↗"}</a></div>`;
  }
}

/* persistent "Book a call" button inside the chat, re-opens the panel */
function addCalCTA(){
  const L=S.lang==="es";
  const row=document.createElement("div"); row.className="row";
  row.appendChild(avatar());
  const wrap=document.createElement("div"); wrap.style.display="flex";
  const btn=document.createElement("button"); btn.type="button"; btn.className="cta";
  btn.textContent = L?"Agendar llamada ↗":"Book a call ↗";
  btn.onclick=openCalPanel;
  wrap.appendChild(btn); row.appendChild(wrap);
  chat.appendChild(row); scrollDown();
}

/* ── Step progression — always decided in JS, never by the AI ───── */
async function advanceAndAsk(prevStep, prevAnswerText){
  const nextStep = prevStep+1;
  S.step = nextStep; setProgress();

  if(nextStep===9){ input.setAttribute("inputmode","email"); input.setAttribute("autocomplete","email"); }
  else { input.setAttribute("inputmode","text"); input.setAttribute("autocomplete","off"); }

  const qDef = QUESTIONS[nextStep];
  if(!qDef) return; // shouldn't happen — step 9 is handled separately in handleMessage

  let ack = "";
  if(qDef.useAck && prevAnswerText){
    showTyping();
    ack = await getAck(prevAnswerText);
    hideTyping();
  } else {
    showTyping(); await wait(350); hideTyping();
  }

  const question = S.lang==="es" ? qDef.es(S.data) : qDef.en(S.data);
  addAI(ack ? `${ack} ${question}` : question);

  if(qDef.tag) showTagsForStep(nextStep, qDef.tag, !!qDef.multi);
}

function showTagsForStep(step, type, multi){
  showTags(type, multi, (vals)=>{
    const arr = Array.isArray(vals) ? vals : [vals];
    addUser(arr.join(", "));
    if(type==="services"){ S.data.services = arr; }
    else if(type==="branding"){ S.data.branding = arr[0]; S.data.brandingIdx = OPTS.branding[S.lang].indexOf(arr[0]); }
    else if(type==="budget"){ S.data.budgetText = arr[0]; S.data.budgetIdx = OPTS.budget[S.lang].indexOf(arr[0]); }
    else if(type==="timeline"){ S.data.timeline = arr[0]; }
    clearTags();
    handleMessage(null, true, arr.join(", "));
  });
}

/* ── Core message handler (deterministic) ─────────
   The JS always knows exactly which step we're on and what to ask
   next — Claude is never asked to track or decide flow, only (optionally)
   to phrase a short acknowledgment. This can never skip a question. ── */
async function handleMessage(userText, isTagSelection=false, ackSource=null){
  if(S.busy) return;
  S.busy=true; sendBtn.disabled=true; sendBtn.classList.add("sending"); clearTags();

  // Step 9 — email — validated locally, loops back on invalid input
  if(S.step===9){
    if(!isTagSelection){
      if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(userText||"")){
        addUser(userText);
        addAI(S.lang==="es"?"Ese email no parece válido — ¿lo revisas?":"That doesn't look like a valid email — mind double-checking it?");
        flashFieldError();
        S.busy=false; sendBtn.disabled=false; sendBtn.classList.remove("sending"); input.focus();
        return;
      }
      addUser(userText);
      S.data.email=userText;
    }
    await finalSequence();
    return;
  }

  let ackText = ackSource;
  if(!isTagSelection){
    addUser(userText);
    ackText = userText;
    const field = STEP_FIELD[S.step];
    if(field==="services"){
      S.data.services = (userText||"").split(",").map(s=>s.trim()).filter(Boolean);
    } else if(field==="budgetText"){
      S.data.budgetText = userText; S.data.budgetIdx = -1;
    } else if(field){
      S.data[field] = userText;
    }
  }

  await advanceAndAsk(S.step, ackText);

  S.busy=false; sendBtn.disabled=false; sendBtn.classList.remove("sending"); input.focus();
}

/* ── Final sequence ─────────────────────────────── */
async function finalSequence(){
  hideTyping();
  const L=S.lang==="es";
  const match=isMatch();

  // Summary message
  showTyping(); await wait(600); hideTyping();
  const svcStr=S.data.services.join(" + ")||(L?"diseño y desarrollo":"design and development");
  const scratch=S.data.brandingIdx===0;
  addAI(`${S.data.name}, ${L?"aquí está tu estimado para":"here's your estimate for"} ${S.data.project}. ${svcStr}${scratch?(L?" desde cero":" from scratch"):""}, ${L?"listo para lanzar.":"built to ship."}`);

  await wait(400);
  renderBrief();
  await wait(500);

  showTyping(); await wait(700); hideTyping();
  if(match){
    addAI(L?`${S.data.project} es exactamente el tipo de proyecto para el que estamos hechos. Elige un horario abajo y hablamos de alcance, proceso y próximos pasos.`:`${S.data.project} is exactly the kind of project we're built for. Pick a time below and let's talk scope, process, and next steps.`);
    await wait(300);
    addCalCTA();
  } else {
    addAI(L?`Gracias por los detalles, ${S.data.name}. El presupuesto está por debajo de nuestro mínimo habitual, pero hay formas más pequeñas de empezar — como un design review enfocado o un sprint de una semana. Te escribimos a ${S.data.email} con opciones.`:`Thanks for the details, ${S.data.name}. The budget sits below our usual minimum, but there are smaller ways to start — like a focused design review or a one-week sprint. We'll reach out at ${S.data.email} with options that fit.`);
  }

  S.step=TOTAL_STEPS; setProgress(); sendLead();
  input.disabled=true; sendBtn.disabled=true; sendBtn.classList.remove("sending");
  input.placeholder=L?"Conversación completada ✓":"Conversation complete ✓";
  S.busy=false;
}

/* ── Submit wiring ──────────────────────────────── */
function submit(){
  if(S.busy) return;
  if(S.step===3 && S.multiSel.size && !input.value.trim()){
    const vals=[...S.multiSel];
    addUser(vals.join(", ")); S.data.services=vals; clearTags();
    handleMessage(null, true, vals.join(", ")); return;
  }
  const v=input.value.trim(); input.value="";
  if(v) handleMessage(v);
}
sendBtn.addEventListener("click", submit);
input.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); submit(); } });

/* ── Language selector ──────────────────────────── */
function showLangSelector(){
  const row = document.createElement("div"); row.className="row";
  row.appendChild(avatar());
  const b = document.createElement("div"); b.className="bubble ai";
  b.textContent="👋  Choose your language / Elige tu idioma";
  row.appendChild(b); chat.appendChild(row);

  const tags = document.createElement("div"); tags.className="tags";

  const en = document.createElement("button"); en.type="button"; en.className="tag";
  en.textContent="🇬🇧  English";
  en.onclick=()=>{ selectLang("en"); };

  const es = document.createElement("button"); es.type="button"; es.className="tag";
  es.textContent="🇪🇸  Español";
  es.onclick=()=>{ selectLang("es"); };

  tags.appendChild(en); tags.appendChild(es);
  chat.appendChild(tags); scrollDown();
  sendBtn.disabled=true; input.disabled=true;
}

function selectLang(lang){
  S.lang = lang;
  // clear language selector
  while(chat.firstChild) chat.removeChild(chat.firstChild);
  sendBtn.disabled=false; input.disabled=false;

  document.getElementById("brandSub").textContent = lang==="es"
    ? "Asistente de cotización ∙ ≈5-10 min"
    : "Quote Assistant ∙ ≈5-10 min";
  input.placeholder = lang==="es" ? "Escribe tu respuesta..." : "Write your answer...";

  addAI(lang==="es"
    ? "Hola — soy el asistente de cotización de Aller Studio. Esto toma entre 5 y 10 minutos, y al final tendrás un alcance y presupuesto estimado para tu proyecto. ¿Cómo te llamas?"
    : "Hey — I'm the Aller Studio quote assistant. This takes about 5–10 minutes, and by the end you'll have an estimated scope and budget for your project. What's your name?");

  S.step=0; setProgress(); input.focus();
}

/* ── Init ───────────────────────────────────────── */
(function init(){
  setProgress();
  showLangSelector();
})();
</script>
